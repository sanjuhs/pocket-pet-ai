name: Bug report
description: Report a reproducible defect
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities here; follow SECURITY.md.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest reproducible steps, command, and inputs.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Commit, OS, hardware, Node/Python/runtime versions, model revision, and quantization where relevant.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove credentials and personal data before attaching anything.
